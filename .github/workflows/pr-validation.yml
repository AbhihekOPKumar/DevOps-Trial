name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate-pr:
    name: Validate PR Against Salesforce Org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x Infrastructure/scripts/*.sh

      - name: Install Salesforce CLI and Plugins
        run: Infrastructure/scripts/install-plugins.sh

      - name: Run Code Analysis
        run: Infrastructure/scripts/code-analysis.sh

      - name: Authenticate Salesforce Org
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
        run: Infrastructure/scripts/authenticate.sh

      - name: Validate Metadata Changes
        run: Infrastructure/scripts/validate.sh